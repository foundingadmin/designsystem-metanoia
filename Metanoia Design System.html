  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Metanoia Design System<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>/* ============================================================\n   Metanoia — Colors & Type Foundations\n   Tokens for the Metanoia design system. Source of truth: \n   Metanoia Visual Identity Guide 2025 v1 (in /assets).\n   ============================================================ */\n\n@font-face {\n  font-family: \"Figtree\";\n  src: url(\"eb024954-b3a6-4d55-a487-d7588f099ca7\") format(\"truetype-variations\");\n  font-weight: 300 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Figtree\";\n  src: url(\"c829239b-8215-4339-be85-37af961277de\") format(\"truetype-variations\");\n  font-weight: 300 900;\n  font-style: italic;\n  font-display: swap;\n}\n\n:root {\n  /* ---------- Brand Colors (from Identity Guide p.9) ---------- */\n\n  /* Primary */\n  --color-navy:        #094B77;   /* Primary brand color */\n  --color-aqua:        #32CBED;   /* Primary accent / brandmark highlight */\n  --color-light-aqua:  #9BEBF9;   /* Soft secondary, washes & backgrounds */\n\n  /* Secondary / System */\n  --color-white:       #FFFFFF;\n  --color-black:       #000000;\n  --color-grey:        #999999;   /* Mid */\n  --color-dark-grey:   #666666;   /* Body secondary */\n\n  /* Tints / supporting (extended to round out the palette) */\n  --color-navy-900:    #062F4A;   /* Deeper navy for headlines on light */\n  --color-navy-700:    #094B77;\n  --color-navy-500:    #1F6EA0;\n  --color-navy-100:    #DCEAF3;   /* Soft navy wash */\n\n  --color-aqua-700:    #1FA8C9;\n  --color-aqua-500:    #32CBED;\n  --color-aqua-200:    #BFF1FB;\n  --color-aqua-50:     #ECFAFD;\n\n  /* Cool greys — slight blue cast (~210° hue) to harmonize with navy + aqua */\n  --color-grey-900:    #131A21;\n  --color-grey-800:    #232C35;\n  --color-grey-700:    #3A4754;\n  --color-grey-600:    #56636F;   /* = dark grey, cool */\n  --color-grey-500:    #6E7A86;\n  --color-grey-400:    #8C97A1;   /* = grey, cool */\n  --color-grey-300:    #B6BEC6;\n  --color-grey-200:    #D8DEE3;\n  --color-grey-100:    #ECEFF2;\n  --color-grey-50:     #F4F6F8;\n\n  /* Semantic / status */\n  --color-success:     #2E9E6E;\n  --color-warning:     #E9A23B;\n  --color-error:       #D6492F;\n  --color-info:        #7C5BD9;   /* purple — distinct from aqua brand color */\n\n  /* ---------- Semantic surfaces ---------- */\n  --bg-canvas:         var(--color-white);\n  --bg-subtle:         var(--color-grey-50);\n  --bg-muted:          var(--color-grey-100);\n  --bg-inverse:        var(--color-navy);\n  --bg-inverse-deep:   var(--color-navy-900);\n  --bg-accent-soft:    var(--color-aqua-50);\n  --bg-accent:         var(--color-aqua);\n\n  /* ---------- Foreground / text ---------- */\n  --fg-1:              var(--color-navy-900);   /* High-contrast headings on light */\n  --fg-2:              var(--color-grey-800);   /* Body */\n  --fg-3:              var(--color-grey-600);   /* Secondary body / captions */\n  --fg-4:              var(--color-grey-400);   /* Tertiary / placeholder */\n  --fg-on-dark:        var(--color-white);\n  --fg-on-dark-2:      rgba(255,255,255,0.72);\n  --fg-on-dark-3:      rgba(255,255,255,0.48);\n  --fg-link:           var(--color-navy);\n  --fg-link-hover:     var(--color-aqua-700);\n  --fg-accent:         var(--color-aqua-700);\n\n  /* ---------- Borders ---------- */\n  --border-subtle:     var(--color-grey-200);\n  --border-default:    var(--color-grey-300);\n  --border-strong:     var(--color-grey-600);\n  --border-accent:     var(--color-aqua);\n  --border-on-dark:    rgba(255,255,255,0.16);\n\n  /* ---------- Typography ---------- */\n  --font-sans: \"Figtree\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n  --font-brand: var(--font-sans);\n\n  /* Weights — Figtree is variable 300–900; we use a tight set */\n  --fw-light:    300;\n  --fw-regular:  400;\n  --fw-medium:   500;\n  --fw-semibold: 600;\n  --fw-bold:     700;\n\n  /* Type scale (1.250 major-third). Sized for product UI; for slides scale up. */\n  --fs-12:  0.75rem;    /* 12 — micro */\n  --fs-13:  0.8125rem;  /* 13 — caption */\n  --fs-14:  0.875rem;   /* 14 — small */\n  --fs-15:  0.9375rem;\n  --fs-16:  1rem;       /* 16 — body */\n  --fs-18:  1.125rem;   /* 18 — body large / subheading */\n  --fs-20:  1.25rem;\n  --fs-22:  1.375rem;\n  --fs-24:  1.5rem;     /* 24 — h4 */\n  --fs-28:  1.75rem;    /* 28 — h3 */\n  --fs-32:  2rem;\n  --fs-36:  2.25rem;    /* 36 — h2 */\n  --fs-44:  2.75rem;\n  --fs-56:  3.5rem;     /* 56 — h1 */\n  --fs-72:  4.5rem;     /* 72 — display */\n  --fs-96:  6rem;       /* 96 — hero display */\n\n  /* Line heights */\n  --lh-tight:   1.05;\n  --lh-snug:    1.2;\n  --lh-normal:  1.45;\n  --lh-relaxed: 1.6;\n\n  /* Letter spacing */\n  --ls-tight:    -0.02em;\n  --ls-snug:     -0.01em;\n  --ls-normal:   0;\n  --ls-wide:     0.04em;\n  --ls-eyebrow:  0.12em;\n\n  /* ---------- Spacing (4px base) ---------- */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* ---------- Radii ---------- */\n  --radius-xs: 2px;\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-2xl: 24px;\n  --radius-pill: 999px;\n\n  /* ---------- Shadows ---------- */\n  --shadow-xs: 0 1px 2px rgba(9,75,119,0.06);\n  --shadow-sm: 0 2px 4px rgba(9,75,119,0.08), 0 1px 2px rgba(9,75,119,0.04);\n  --shadow-md: 0 6px 14px rgba(9,75,119,0.10), 0 2px 4px rgba(9,75,119,0.06);\n  --shadow-lg: 0 16px 32px rgba(9,75,119,0.12), 0 4px 8px rgba(9,75,119,0.06);\n  --shadow-xl: 0 28px 56px rgba(9,75,119,0.18), 0 8px 16px rgba(9,75,119,0.08);\n  --shadow-focus: 0 0 0 3px rgba(50,203,237,0.45);\n\n  /* ---------- Motion ---------- */\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1);\n  --ease-emphasized: cubic-bezier(0.2, 0, 0, 1.2);\n  --ease-out: cubic-bezier(0, 0, 0, 1);\n  --dur-fast: 120ms;\n  --dur-base: 200ms;\n  --dur-slow: 320ms;\n\n  /* ---------- Layout ---------- */\n  --container-narrow: 720px;\n  --container-default: 1120px;\n  --container-wide: 1440px;\n}\n\n/* ============================================================\n   Semantic type roles — apply directly via classes\n   ============================================================ */\n\n.t-display,\n.t-h1,\n.t-h2,\n.t-h3,\n.t-h4,\n.t-h5,\n.t-eyebrow,\n.t-lead,\n.t-body,\n.t-body-sm,\n.t-caption,\n.t-mono,\n.t-wordmark {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n}\n\n.t-display { font-size: 7.5rem; font-weight: var(--fw-semibold); line-height: 0.95; letter-spacing: -0.035em; text-wrap: balance; }\n.t-h1 { font-size: var(--fs-56); font-weight: var(--fw-bold); line-height: var(--lh-tight); letter-spacing: var(--ls-tight); text-wrap: balance; }\n.t-h2 { font-size: var(--fs-36); font-weight: var(--fw-bold); line-height: var(--lh-snug); letter-spacing: var(--ls-snug); text-wrap: balance; }\n.t-h3 { font-size: var(--fs-28); font-weight: var(--fw-semibold); line-height: var(--lh-snug); letter-spacing: var(--ls-snug); text-wrap: balance; }\n.t-h4 { font-size: var(--fs-22); font-weight: var(--fw-semibold); line-height: var(--lh-snug); text-wrap: balance; }\n.t-h5 { font-size: var(--fs-18); font-weight: var(--fw-semibold); line-height: var(--lh-snug); text-wrap: balance; }\n.t-lead { font-size: var(--fs-20); font-weight: var(--fw-regular); line-height: var(--lh-relaxed); color: var(--fg-2); text-wrap: pretty; }\n.t-body { font-size: var(--fs-16); font-weight: var(--fw-regular); line-height: var(--lh-relaxed); color: var(--fg-2); text-wrap: pretty; }\n\n.t-eyebrow {\n  font-size: var(--fs-13);\n  font-weight: var(--fw-semibold);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n\n.t-lead {\n  font-size: var(--fs-20);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-2);\n}\n\n.t-body {\n  font-size: var(--fs-16);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-2);\n}\n\n.t-body-sm {\n  font-size: var(--fs-14);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-normal);\n  color: var(--fg-2);\n}\n\n.t-caption {\n  font-size: var(--fs-12);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-normal);\n  color: var(--fg-3);\n}\n\n.t-mono {\n  font-family: var(--font-mono);\n  font-size: var(--fs-14);\n  line-height: var(--lh-normal);\n  color: var(--fg-2);\n}\n\n/* The wordmark is ALWAYS lowercase, heavy Figtree, tight tracking. */\n.t-wordmark {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-black);\n  text-transform: lowercase;\n  letter-spacing: var(--ls-tight);\n  line-height: 1;\n  color: var(--color-navy);\n}\n\n/* Element defaults — opt-in via .metanoia-typography on a wrapper */\n.metanoia-typography {\n  font-family: var(--font-sans);\n  color: var(--fg-2);\n  font-size: var(--fs-16);\n  line-height: var(--lh-relaxed);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n.metanoia-typography h1 { font-size: var(--fs-56); font-weight: var(--fw-bold); line-height: var(--lh-tight); letter-spacing: var(--ls-tight); color: var(--fg-1); text-wrap: balance; }\n.metanoia-typography h2 { font-size: var(--fs-36); font-weight: var(--fw-bold); line-height: var(--lh-snug); letter-spacing: var(--ls-snug); color: var(--fg-1); text-wrap: balance; }\n.metanoia-typography h3 { font-size: var(--fs-28); font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--fg-1); text-wrap: balance; }\n.metanoia-typography h4 { font-size: var(--fs-22); font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--fg-1); text-wrap: balance; }\n.metanoia-typography p  { margin: 0 0 var(--space-4); text-wrap: pretty; }\n.metanoia-typography a  { color: var(--fg-link); text-decoration: underline; text-underline-offset: 2px; }\n.metanoia-typography a:hover { color: var(--fg-link-hover); }\n.metanoia-typography code, .metanoia-typography pre { font-family: var(--font-mono); }\n<\u002Fstyle>\n\n<style>\n  html,body{margin:0;padding:0;background:var(--bg-subtle);font-family:var(--font-sans);color:var(--fg-1);}\n  .page{max-width:1280px;margin:0 auto;padding:64px 48px 96px;}\n  header{margin-bottom:48px;display:flex;align-items:flex-end;justify-content:space-between;gap:32px;flex-wrap:wrap;}\n  header img{height:48px;width:auto;}\n  header h1{font-size:40px;font-weight:600;line-height:1;letter-spacing:-0.025em;margin:0 0 8px;color:var(--fg-1);text-wrap:balance;}\n  header p{font-size:15px;color:var(--fg-3);margin:0;max-width:48em;text-wrap:pretty;}\n  section{margin-bottom:56px;}\n  section > h2{\n    font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;\n    color:var(--fg-3);margin:0 0 16px;padding-bottom:10px;\n    border-bottom:1px solid var(--border-default);\n  }\n  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}\n  .grid.three{grid-template-columns:repeat(3,1fr);}\n  .card{\n    background:#fff;border:1px solid var(--border-subtle);border-radius:12px;\n    overflow:hidden;box-shadow:0 1px 2px rgba(9,75,119,0.06);\n    display:flex;flex-direction:column;\n  }\n  .card .name{\n    font-size:12px;font-weight:600;letter-spacing:0.04em;\n    color:var(--fg-2);padding:10px 14px;border-bottom:1px solid var(--border-subtle);\n    background:#fff;display:flex;justify-content:space-between;align-items:center;\n  }\n  .card .name span{color:var(--fg-3);font-weight:400;}\n  .card iframe{\n    width:100%;border:0;display:block;background:#fff;\n  }\n  footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--border-default);font-size:12px;color:var(--fg-3);text-wrap:balance;}\n  footer code{font-family:var(--font-mono);background:var(--color-grey-100);padding:1px 6px;border-radius:4px;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"page\">\n    <header>\n      <div>\n        <h1>Metanoia Design System<\u002Fh1>\n        <p>Brand foundations, color &amp; type tokens, and core components for AIC and the iBOM platform. All cards below are live HTML rendered against <code>colors_and_type.css<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n      <img src=\"a4e33930-08b6-4c0f-8b3c-0d5c5887da09\" alt=\"metanoia\">\n    <\u002Fheader>\n\n    <section>\n      <h2>Brand<\u002Fh2>\n      <div class=\"grid\">\n        <div class=\"card\"><div class=\"name\">Brandmark <span>Color · mono · wash<\u002Fspan><\u002Fdiv><iframe src=\"preview/logo-brandmark.html\" style=\"height:240px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Lockups <span>Horizontal &amp; vertical<\u002Fspan><\u002Fdiv><iframe src=\"preview/logo-lockups.html\" style=\"height:240px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\" style=\"grid-column:1/-1\"><div class=\"name\">Iconography <span>Lucide · 2px stroke (substitution)<\u002Fspan><\u002Fdiv><iframe src=\"preview/iconography.html\" style=\"height:220px\"><\u002Fiframe><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section>\n      <h2>Colors<\u002Fh2>\n      <div class=\"grid\">\n        <div class=\"card\"><div class=\"name\">Primary <span>Navy · Aqua · Light Aqua<\u002Fspan><\u002Fdiv><iframe src=\"preview/colors-primary.html\" style=\"height:220px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Neutrals <span>Cool greyscale<\u002Fspan><\u002Fdiv><iframe src=\"preview/colors-neutrals.html\" style=\"height:160px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Tints <span>Navy &amp; aqua tonal extensions<\u002Fspan><\u002Fdiv><iframe src=\"preview/colors-tints.html\" style=\"height:240px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Semantic <span>Success · Warning · Error · Info<\u002Fspan><\u002Fdiv><iframe src=\"preview/colors-semantic.html\" style=\"height:160px\"><\u002Fiframe><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section>\n      <h2>Type<\u002Fh2>\n      <div class=\"grid\">\n        <div class=\"card\" style=\"grid-column:1/-1\"><div class=\"name\">Display &amp; Headings <span>Figtree<\u002Fspan><\u002Fdiv><iframe src=\"preview/type-display.html\" style=\"height:380px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Body &amp; Eyebrow <span>Lead · body · caption · mono<\u002Fspan><\u002Fdiv><iframe src=\"preview/type-body.html\" style=\"height:340px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Weights <span>Variable 300–700<\u002Fspan><\u002Fdiv><iframe src=\"preview/type-weights.html\" style=\"height:340px\"><\u002Fiframe><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section>\n      <h2>Spacing<\u002Fh2>\n      <div class=\"grid three\">\n        <div class=\"card\"><div class=\"name\">Spacing scale <span>4px base<\u002Fspan><\u002Fdiv><iframe src=\"preview/spacing-scale.html\" style=\"height:360px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Radii <span>xs → pill<\u002Fspan><\u002Fdiv><iframe src=\"preview/spacing-radii.html\" style=\"height:200px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Shadows <span>Navy-tinted elevation<\u002Fspan><\u002Fdiv><iframe src=\"preview/spacing-shadows.html\" style=\"height:200px\"><\u002Fiframe><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section>\n      <h2>Components<\u002Fh2>\n      <div class=\"grid\">\n        <div class=\"card\"><div class=\"name\">Buttons <span>Variants &amp; sizes<\u002Fspan><\u002Fdiv><iframe src=\"preview/components-buttons.html\" style=\"height:240px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Inputs <span>Default · focus · error · search<\u002Fspan><\u002Fdiv><iframe src=\"preview/components-inputs.html\" style=\"height:280px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Tags &amp; Status <span>Pills &amp; filter chips<\u002Fspan><\u002Fdiv><iframe src=\"preview/components-tags.html\" style=\"height:200px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Card <span>With &amp; without image<\u002Fspan><\u002Fdiv><iframe src=\"preview/components-card.html\" style=\"height:560px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Alerts <span>Info · warning · error<\u002Fspan><\u002Fdiv><iframe src=\"preview/components-alerts.html\" style=\"height:260px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\"><div class=\"name\">Table row <span>Parts table<\u002Fspan><\u002Fdiv><iframe src=\"preview/components-table.html\" style=\"height:280px\"><\u002Fiframe><\u002Fdiv>\n        <div class=\"card\" style=\"grid-column:1/-1\"><div class=\"name\">Hero strip <span>Navy with brandmark watermark<\u002Fspan><\u002Fdiv><iframe src=\"preview/components-hero.html\" style=\"height:300px\"><\u002Fiframe><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer>\n      Metanoia Design System · Visual identity rooted in the Metanoia 2025 Identity Guide. Iconography uses Lucide as a flagged substitution. Tokens live in <code>colors_and_type.css<\u002Fcode>.\n    <\u002Ffooter>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
