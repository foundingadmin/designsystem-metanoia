<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px 28px;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-2);}
  h2{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);margin:0 0 16px;}
  .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:14px;}
  .hint{font-size:11px;color:var(--fg-3);margin-top:-6px;margin-bottom:14px;}

  /* Enhanced interactions — supplements base classes from styles/components.css */
  .btn {
    transition:
      transform         160ms var(--ease-standard),
      box-shadow        200ms var(--ease-standard),
      background-color  160ms var(--ease-standard),
      border-color      160ms var(--ease-standard),
      color             160ms var(--ease-standard);
    will-change: transform, box-shadow;
  }
  .btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(50,203,237,0.55); }

  .btn--primary {
    box-shadow:
      0 1px 0 rgba(255,255,255,0.12) inset,
      0 1px 2px rgba(6,47,74,0.20),
      0 2px 6px rgba(9,75,119,0.18);
  }
  .btn--primary:hover {
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.16) inset,
      0 4px 10px rgba(9,75,119,0.28),
      0 8px 18px rgba(9,75,119,0.18);
  }
  .btn--primary:active {
    transform: translateY(0);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.10) inset,
      0 1px 2px rgba(6,47,74,0.30);
  }

  .btn--secondary {
    border-width: 1.5px;
    box-shadow:
      0 1px 0 rgba(9,75,119,0.04) inset,
      0 1px 2px rgba(9,75,119,0.06);
  }
  .btn--secondary:hover {
    transform: translateY(-1px);
    box-shadow:
      0 4px 10px rgba(9,75,119,0.14),
      0 8px 18px rgba(9,75,119,0.08);
  }
  .btn--secondary:active {
    transform: translateY(0);
    box-shadow: 0 1px 2px rgba(9,75,119,0.08) inset;
  }

  /* Bespoke variants — not in standard token system yet */
  .btn--accent {
    background: var(--color-aqua);
    color: var(--color-navy-900);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.35) inset,
      0 1px 2px rgba(31,168,201,0.18),
      0 2px 6px rgba(50,203,237,0.22);
  }
  .btn--accent:hover {
    background: var(--color-aqua-700);
    color: var(--color-white);
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.20) inset,
      0 4px 10px rgba(31,168,201,0.32),
      0 8px 18px rgba(31,168,201,0.20);
  }
  .btn--accent:active {
    transform: translateY(0);
    background: #168AA8;
    color: var(--color-white);
    box-shadow: 0 1px 2px rgba(22,138,168,0.30) inset;
  }

  .btn--danger {
    background: var(--color-error-600);
    color: var(--color-white);
    box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 2px 6px rgba(214,73,47,0.22);
  }
  .btn--danger:hover {
    background: var(--color-error-700);
    transform: translateY(-1px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 6px 14px rgba(214,73,47,0.28);
  }
</style>
</head>
<body>
  <h2>Variants</h2>
  <div class="row">
    <button class="btn btn--primary">Open AIC <span style="font-weight:400">→</span></button>
    <button class="btn btn--secondary">Learn more</button>
    <button class="btn btn--accent">Request demo</button>
    <button class="btn btn--ghost">Cancel</button>
    <button class="btn btn--danger">Delete iBOM</button>
  </div>
  <p class="hint">Hover any button to see the lift &amp; shadow grow. Secondary uses navy-900 text on white (~12.7:1) with a 1.5px navy border.</p>

  <h2 style="margin-top:14px">Sizes</h2>
  <div class="row">
    <button class="btn btn--primary btn--sm">Small</button>
    <button class="btn btn--primary">Medium</button>
    <button class="btn btn--primary btn--lg">Large</button>
  </div>

  <h2 style="margin-top:14px">States — Primary</h2>
  <div class="row">
    <button class="btn btn--primary">Default</button>
    <button class="btn btn--primary" disabled>Disabled</button>
  </div>

  <h2 style="margin-top:14px">States — Secondary</h2>
  <div class="row">
    <button class="btn btn--secondary">Default</button>
    <button class="btn btn--secondary" disabled>Disabled</button>
  </div>

  <h2 style="margin-top:14px">States — Ghost</h2>
  <div class="row">
    <button class="btn btn--ghost">Default</button>
    <button class="btn btn--ghost" disabled>Disabled</button>
  </div>
</body>
</html>
