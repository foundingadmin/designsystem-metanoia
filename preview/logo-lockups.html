<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<title>Logo — Lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-2);}

  /* ── Semantic logo tokens (mirrors Figma Logo/* variables) ── */
  :root {
    --logo-mark:     var(--color-navy);
    --logo-accent:   var(--color-aqua);
    --logo-wordmark: var(--color-navy);
  }
  [data-theme="dark"] {
    --logo-mark:     var(--color-white);
    --logo-wordmark: var(--color-white);
  }

  /* ── SVG fill classes ── */
  .logo-mark     { fill: var(--logo-mark); }
  .logo-accent   { fill: var(--logo-accent); }
  .logo-wordmark { fill: var(--logo-wordmark); }

  /* ── Grid ── */
  .card {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 1px;
    background: var(--border-subtle);
  }
  .tile {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 52px;
    position: relative;
    background: var(--bg-canvas);
    height: 200px;
  }
  .tile svg { max-width: 100%; max-height: 100px; display: block; }
  .label {
    position: absolute;
    left: 12px;
    bottom: 10px;
    font-size: 11px;
    letter-spacing: var(--ls-wide, 0.12em);
    text-transform: uppercase;
    color: var(--fg-3);
    font-weight: 600;
  }

  /* ── Download button ── */
  .dl-btn {
    position: absolute;
    top: 10px; right: 10px;
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    text-decoration: none;
    background: rgba(255,255,255,0.85); color: var(--color-navy);
    border: 1px solid rgba(9,75,119,0.18);
    opacity: 0; transform: translateY(-4px);
    transition: opacity 140ms, transform 140ms;
    backdrop-filter: blur(4px);
  }
  .tile:hover .dl-btn { opacity: 1; transform: translateY(0); }
  .dl-btn:active { opacity: 0.8; }
  .dl-btn svg { flex-shrink: 0; }
</style>
</head>
